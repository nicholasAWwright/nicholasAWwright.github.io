<div class="project-card">
  <div class="project-thumbnail">
    {% if include.project.image %}
      <img src="{{ include.project.image }}" alt="{{ include.project.title }}">
    {% else %}
      <div class="no-image">[ no image ]</div>
    {% endif %}
  </div>
  <div class="project-info">
    <h3>{{ include.project.title }}</h3>
    <p>{{ include.project.description }}</p>
    {% if include.project.links %}
      <div class="project-links">
        {% for link in include.project.links %}
          <a href="{{ link.url }}" target="_blank" rel="noopener" class="btn">{{ link.label }}</a>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</div>
